name: "Deploy - Dev"

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: "Deploy to Dev"
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy app files to Dev VM
        run: |
          echo "${{ secrets.DEV_SSH_KEY }}" > /tmp/dev_key
          chmod 600 /tmp/dev_key
          scp -i /tmp/dev_key -o StrictHostKeyChecking=no -r \
            app/ Dockerfile .dockerignore docker-compose.yml \
            ${{ secrets.DEV_USER }}@${{ secrets.DEV_HOST }}:/opt/app/
          rm /tmp/dev_key

      - name: Deploy Flask container on Dev
        run: |
          echo "${{ secrets.DEV_SSH_KEY }}" > /tmp/dev_key
          chmod 600 /tmp/dev_key
          ssh -i /tmp/dev_key -o StrictHostKeyChecking=no \
            ${{ secrets.DEV_USER }}@${{ secrets.DEV_HOST }} << 'EOF'
          set -e
          cd /opt/app
          export HOST_PORT=5000
          export ENVIRONMENT=dev
          sudo docker compose down --remove-orphans
          sudo docker compose up -d --build
          sudo docker compose ps
          EOF
          rm /tmp/dev_key

      - name: Smoke test
        run: |
          sleep 4
          curl -f "http://${{ secrets.DEV_HOST }}:5000/health" | python3 -m json.tool
          echo '=== Dev deploy complete ==='
